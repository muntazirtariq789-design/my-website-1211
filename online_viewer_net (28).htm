<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NIGHT DRIFT — Gas & Brake Pedals Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap');

  :root{
    --asphalt: #0b0d10;
    --asphalt-2: #14171c;
    --amber: #ffb020;
    --cyan: #3de3d8;
    --red: #ff4655;
    --green: #2ecc71;
    --ink: #e8e6e1;
    --ink-dim: #8b9096;
    --panel: rgba(20,23,28,0.92);
    --line: rgba(232,230,225,0.10);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--asphalt);
    font-family:'Rajdhani', sans-serif;
    color:var(--ink);
    overflow:hidden;
    user-select:none;
  }
  #app{ position:relative; width:100%; height:100vh; }

  canvas{ display:block; background:var(--asphalt-2); }

  .eyebrow{
    font-family:'Orbitron', sans-serif;
    font-size:11px;
    letter-spacing:.32em;
    color:var(--cyan);
    text-transform:uppercase;
  }

  h1.title{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:clamp(34px, 7vw, 58px);
    margin:6px 0 2px 0;
    letter-spacing:.03em;
    color:var(--ink);
    text-shadow: 0 0 24px rgba(61,227,216,0.35);
  }
  h1.title span{ color:var(--amber); text-shadow:0 0 24px rgba(255,176,32,0.45); }

  .subtitle{ color:var(--ink-dim); font-size:15px; margin-bottom:20px; letter-spacing:.02em; }

  /* HUD Header */
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:16px 20px; pointer-events:none; z-index:5;
  }
  .hud-cluster{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 16px;
    pointer-events:auto;
    backdrop-filter: blur(6px);
  }
  .hud-stat{ display:flex; flex-direction:column; align-items:flex-start; margin-right:18px; }
  .hud-stat:last-child{ margin-right:0; }
  .hud-row{ display:flex; }
  .hud-label{ font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:.2em; color:var(--ink-dim); }
  .hud-value{ font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700; color:var(--amber); line-height:1.3; }
  .hud-value.cyan{ color:var(--cyan); }

  .hud-right{ display:flex; gap:10px; pointer-events:auto; }

  .hud-icon-btn{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--ink);
    width:44px; height:44px;
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform 0.05s ease, border-color 0.15s ease;
  }
  .hud-icon-btn:active, .hud-icon-btn.pressed{
    transform: scale(0.92);
    border-color: var(--amber);
  }
  #lightBtn.on{ border-color:var(--amber); box-shadow:0 0 14px rgba(255,176,32,0.35); }
  #pauseBtn{ border-color:var(--cyan); }
  #hornBtn{ border-color:var(--amber); }

  /* Screen Overlays */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 20%, rgba(61,227,216,0.06), transparent 60%), rgba(6,7,9,0.86);
    backdrop-filter: blur(10px);
    z-index:10;
    text-align:center;
    padding:20px;
  }
  .hidden{ display:none !important; }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:24px 28px;
    width:min(420px, 92vw);
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
  }

  .select-group{
    margin-bottom:20px;
    text-align:left;
  }
  .select-group label{
    font-family:'Orbitron', sans-serif;
    font-size:11px;
    letter-spacing:.15em;
    color:var(--cyan);
    display:block;
    margin-bottom:8px;
  }
  select.custom-select{
    width:100%;
    padding:12px;
    border-radius:8px;
    background:#14171c;
    border:1px solid var(--line);
    color:var(--ink);
    font-family:'Rajdhani', sans-serif;
    font-size:16px;
    font-weight:600;
    outline:none;
    cursor:pointer;
  }
  select.custom-select:focus{
    border-color:var(--cyan);
  }

  button.btn{
    font-family:'Orbitron', sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:14px 20px;
    width:100%;
    border-radius:10px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink);
    cursor:pointer;
    margin-bottom:10px;
    transition:all .15s ease;
  }
  button.btn.primary{
    background:var(--amber); color:#1a1200; border-color:var(--amber);
  }

  /* Mobile Touch Controls */
  #touchControls{
    position:absolute;
    bottom:20px; left:0; right:0;
    display:flex;
    justify-content:space-between;
    padding:0 20px;
    z-index:6;
    pointer-events:none;
  }

  .control-group{
    display:flex;
    gap:12px;
  }

  .arrow-btn{
    pointer-events:auto;
    width:66px; height:66px;
    border-radius:18px;
    background:rgba(20, 23, 28, 0.85);
    border:2px solid rgba(61, 227, 216, 0.5);
    color:var(--cyan);
    display:flex;
    align-items:center;
    justify-content:center;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(61, 227, 216, 0.2);
    transition: transform 0.1s ease, background 0.1s ease, border-color 0.1s ease;
    user-select: none;
    -webkit-user-select: none;
  }

  .arrow-btn svg {
    width: 32px;
    height: 32px;
    fill: var(--cyan);
    filter: drop-shadow(0 0 6px rgba(61, 227, 216, 0.7));
  }

  .arrow-btn:active, .arrow-btn.pressed {
    background: rgba(61, 227, 216, 0.3);
    border-color: var(--cyan);
    transform: scale(0.92);
    box-shadow: 0 0 24px rgba(61, 227, 216, 0.7);
  }

  /* Pedal Styles */
  .pedal-btn{
    pointer-events:auto;
    width:58px; height:86px;
    border-radius:14px;
    font-family:'Orbitron', sans-serif;
    font-size:11px;
    font-weight:900;
    letter-spacing:.05em;
    display:flex;
    align-items:center;
    justify-content:center;
    backdrop-filter: blur(8px);
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.1s ease, background 0.1s ease, border-color 0.1s ease;
  }

  #touchBrake{
    background:rgba(255, 70, 85, 0.2);
    border:2px solid var(--red);
    color:var(--red);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(255, 70, 85, 0.3);
  }
  #touchBrake:active, #touchBrake.pressed{
    background:rgba(255, 70, 85, 0.5);
    transform: scale(0.92);
    box-shadow: 0 0 24px rgba(255, 70, 85, 0.8);
  }

  #touchGas{
    background:rgba(46, 204, 113, 0.2);
    border:2px solid var(--green);
    color:var(--green);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(46, 204, 113, 0.3);
  }
  #touchGas:active, #touchGas.pressed{
    background:rgba(46, 204, 113, 0.5);
    transform: scale(0.92);
    box-shadow: 0 0 24px rgba(46, 204, 113, 0.8);
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud" class="hidden">
    <div class="hud-cluster">
      <div class="hud-row">
        <div class="hud-stat">
          <span class="hud-label">LEVEL</span>
          <span class="hud-value cyan" id="hudLevel">1</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">DISTANCE</span>
          <span class="hud-value" id="hudScore">0</span>
        </div>
        <div class="hud-stat">
          <span class="hud-label">SPEED</span>
          <span class="hud-value cyan" id="hudSpeed">0</span>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <button id="hornBtn" class="hud-icon-btn" title="Hold 'H' / Space / Tap to Honk">🎺</button>
      <button id="lightBtn" class="hud-icon-btn on" title="Toggle headlights">💡</button>
      <button id="pauseBtn" class="hud-icon-btn" title="Pause Game (P)">⏸</button>
    </div>
  </div>

  <div id="touchControls">
    <div class="control-group">
      <div id="touchLeft" class="arrow-btn">
        <svg viewBox="0 0 24 24">
          <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </div>
      <div id="touchRight" class="arrow-btn">
        <svg viewBox="0 0 24 24">
          <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
      </div>
    </div>

    <div class="control-group">
      <div id="touchBrake" class="pedal-btn">BRAKE</div>
      <div id="touchGas" class="pedal-btn">GAS</div>
    </div>
  </div>

  <div id="mainMenu" class="screen">
    <div class="eyebrow">NEON HIGHWAY // PEDALS EDITION</div>
    <h1 class="title">NIGHT <span>DRIFT</span></h1>
    <div class="subtitle">Use W/Up Arrow for GAS, S/Down Arrow for BRAKE, A/D for Steering.</div>
    
    <div class="panel">
      <div class="select-group">
        <label for="soundProfile">DYNAMIC ENGINE PROFILE</label>
        <select id="soundProfile" class="custom-select">
          <option value="ferrari">🏎️ Ferrari V8 / V10 Supercar</option>
          <option value="f1">🏎️ Formula 1 V12 Screamer</option>
          <option value="muscle">🚘 American Muscle V8 Rumble</option>
          <option value="electric">⚡ Cyberpunk Electric Motor</option>
        </select>
      </div>
      <button class="btn primary" id="btnStart">Start Game</button>
    </div>
  </div>

  <div id="pauseMenu" class="screen hidden">
    <div class="eyebrow">GAME PAUSED</div>
    <h1 class="title">TAKE A <span>BREATHER</span></h1>
    <div class="panel">
      <div class="select-group">
        <label for="pauseSoundProfile">CHANGE ENGINE SOUND</label>
        <select id="pauseSoundProfile" class="custom-select">
          <option value="ferrari">🏎️ Ferrari V8 / V10 Supercar</option>
          <option value="f1">🏎️ Formula 1 V12 Screamer</option>
          <option value="muscle">🚘 American Muscle V8 Rumble</option>
          <option value="electric">⚡ Cyberpunk Electric Motor</option>
        </select>
      </div>
      <button class="btn primary" id="btnResume">Resume</button>
    </div>
  </div>

  <div id="gameOverMenu" class="screen hidden">
    <div class="eyebrow">WRECKED</div>
    <h1 class="title">RUN <span>OVER</span></h1>
    <div class="panel">
      <button class="btn primary" id="btnRetry">Retry</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // --- AUDIO ENGINE ---
  let audioCtx = null;
  let oscSaw = null, oscSquare = null, oscSub = null;
  let engineGain = null, engineFilter = null, secondaryFilter = null;
  let driftOsc = null, driftGain = null;
  let currentProfile = 'ferrari';

  function initAudio() {
    if (audioCtx) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();

    engineGain = audioCtx.createGain();
    engineGain.gain.setValueAtTime(0.09, audioCtx.currentTime);

    engineFilter = audioCtx.createBiquadFilter();
    secondaryFilter = audioCtx.createBiquadFilter();

    oscSaw = audioCtx.createOscillator();
    oscSquare = audioCtx.createOscillator();
    oscSub = audioCtx.createOscillator();

    applyEngineProfile(currentProfile);

    oscSaw.connect(engineFilter);
    oscSquare.connect(engineFilter);
    oscSub.connect(secondaryFilter);

    engineFilter.connect(secondaryFilter);
    secondaryFilter.connect(engineGain);
    engineGain.connect(audioCtx.destination);

    oscSaw.start();
    oscSquare.start();
    oscSub.start();

    // Drift Screech
    driftOsc = audioCtx.createOscillator();
    driftGain = audioCtx.createGain();
    driftOsc.type = 'triangle';
    driftOsc.frequency.setValueAtTime(780, audioCtx.currentTime);
    driftGain.gain.setValueAtTime(0, audioCtx.currentTime);

    driftOsc.connect(driftGain);
    driftGain.connect(audioCtx.destination);
    driftOsc.start();
  }

  function applyEngineProfile(profileName) {
    currentProfile = profileName;
    if (!audioCtx) return;

    if (profileName === 'ferrari') {
      oscSaw.type = 'sawtooth';
      oscSquare.type = 'square';
      oscSub.type = 'sine';
      engineFilter.type = 'lowpass';
      secondaryFilter.type = 'peaking';
      secondaryFilter.gain.setValueAtTime(6, audioCtx.currentTime);
    } else if (profileName === 'f1') {
      oscSaw.type = 'sawtooth';
      oscSquare.type = 'triangle';
      oscSub.type = 'sawtooth';
      engineFilter.type = 'bandpass';
      secondaryFilter.type = 'highpass';
    } else if (profileName === 'muscle') {
      oscSaw.type = 'sawtooth';
      oscSquare.type = 'square';
      oscSub.type = 'triangle';
      engineFilter.type = 'lowpass';
      secondaryFilter.type = 'lowpass';
    } else if (profileName === 'electric') {
      oscSaw.type = 'sine';
      oscSquare.type = 'triangle';
      oscSub.type = 'sine';
      engineFilter.type = 'lowpass';
      secondaryFilter.type = 'peaking';
    }
  }

  function updateEngineAudio(currentSpeed) {
    if (!audioCtx || !oscSaw || !oscSquare || !oscSub) return;

    let baseFreq, secondaryFreq, subFreq, filterFreq, resVal;

    if (currentProfile === 'ferrari') {
      baseFreq = 45 + (currentSpeed * 0.45);
      secondaryFreq = baseFreq * 1.5;
      subFreq = baseFreq * 0.5;
      filterFreq = 220 + (currentSpeed * 3.8);
      resVal = 3.5 + (currentSpeed * 0.005);
    } else if (currentProfile === 'f1') {
      baseFreq = 85 + (currentSpeed * 0.9);
      secondaryFreq = baseFreq * 2.0;
      subFreq = baseFreq * 0.75;
      filterFreq = 400 + (currentSpeed * 5.2);
      resVal = 5.0 + (currentSpeed * 0.008);
    } else if (currentProfile === 'muscle') {
      baseFreq = 30 + (currentSpeed * 0.35);
      secondaryFreq = baseFreq * 0.5;
      subFreq = baseFreq * 0.25;
      filterFreq = 150 + (currentSpeed * 2.4);
      resVal = 2.0;
    } else if (currentProfile === 'electric') {
      baseFreq = 120 + (currentSpeed * 1.2);
      secondaryFreq = baseFreq * 1.33;
      subFreq = baseFreq * 0.5;
      filterFreq = 600 + (currentSpeed * 4.2);
      resVal = 1.0;
    }

    oscSaw.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.04);
    oscSquare.frequency.setTargetAtTime(secondaryFreq, audioCtx.currentTime, 0.04);
    oscSub.frequency.setTargetAtTime(subFreq, audioCtx.currentTime, 0.04);
    
    engineFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.04);
    engineFilter.Q.setTargetAtTime(resVal, audioCtx.currentTime, 0.04);
  }

  // --- HORN SYNTHESIZER ---
  let hornGainNode = null, hornOscLow = null, hornOscHigh = null, isHornPlaying = false;

  function startHornSound() {
    if (!audioCtx || isHornPlaying) return;
    isHornPlaying = true;

    const hornLowFreq = 523.25, hornHighFreq = 659.25;

    hornGainNode = audioCtx.createGain();
    hornGainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
    hornGainNode.gain.linearRampToValueAtTime(0.22, audioCtx.currentTime + 0.04);

    hornOscLow = audioCtx.createOscillator();
    hornOscHigh = audioCtx.createOscillator();

    hornOscLow.type = 'sawtooth';
    hornOscHigh.type = 'sawtooth';

    hornOscLow.frequency.setValueAtTime(hornLowFreq, audioCtx.currentTime);
    hornOscHigh.frequency.setValueAtTime(hornHighFreq, audioCtx.currentTime);

    const hornFilter = audioCtx.createBiquadFilter();
    hornFilter.type = 'bandpass';
    hornFilter.frequency.setValueAtTime(2200, audioCtx.currentTime);
    hornFilter.Q.setValueAtTime(1.2, audioCtx.currentTime);

    hornOscLow.connect(hornFilter);
    hornOscHigh.connect(hornFilter);
    hornFilter.connect(hornGainNode);
    hornGainNode.connect(audioCtx.destination);

    hornOscLow.start();
    hornOscHigh.start();
  }

  function stopHornSound() {
    if (!audioCtx || !isHornPlaying || !hornGainNode) return;
    
    hornGainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    hornGainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);

    const oscLowToStop = hornOscLow;
    const oscHighToStop = hornOscHigh;

    setTimeout(() => {
      try {
        if (oscLowToStop) oscLowToStop.stop();
        if (oscHighToStop) oscHighToStop.stop();
      } catch(e) {}
    }, 70);

    isHornPlaying = false;
    hornGainNode = null;
    hornOscLow = null;
    hornOscHigh = null;
  }

  function playDriftSound(isTurning) {
    if (!audioCtx || !driftGain) return;
    const targetGain = isTurning ? 0.05 : 0;
    driftGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.05);
  }

  function muteAudio(mute) {
    if (!audioCtx || !engineGain || !driftGain) return;
    const targetEngine = mute ? 0 : 0.09;
    engineGain.gain.setTargetAtTime(targetEngine, audioCtx.currentTime, 0.05);
    if (mute) {
      driftGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
      stopHornSound();
    }
  }

  function playCrashSound() {
    if (!audioCtx) return;
    stopHornSound();

    const bufferSize = audioCtx.sampleRate * 0.4;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

    noise.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start();

    if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
  }

  function playLevelUpSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    
    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.12);
    
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  }

  function playClickSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
  }

  // --- GAME LOGIC ---
  let level = 1;
  const distancePerLevel = 400;
  let levelBannerTimer = 0;
  let headlightsOn = true;
  let isBraking = false;

  function roundRect(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function shadeColor(color, percent) {
    let num = parseInt(color.replace("#",""),16),
    amt = Math.round(2.55 * percent),
    R = (num >> 16) + amt,
    B = (num >> 8 & 0x00FF) + amt,
    G = (num & 0x0000FF) + amt;
    return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (B<255?B<1?0:B:255)*0x100 + (G<255?G<1?0:G:255)).toString(16).slice(1);
  }

  const LANES = 4;
  let laneWidth;
  function computeLaneWidth(){ laneWidth = Math.min(W * 0.6, 520) / LANES; }
  computeLaneWidth();

  let player = null, traffic = [], roadOffset = 0, distance = 0, speed = 0;
  let running = false, isPaused = false, gameOverFlag = false, spawnTimer = 0;
  let keys = {};
  let touchState = { left: false, right: false, gas: false, brake: false };

  function laneX(laneIndex){
    const roadCenter = W/2;
    const totalWidth = laneWidth * LANES;
    return (roadCenter - totalWidth/2) + laneWidth * laneIndex + laneWidth/2;
  }

  function resetGame(){
    computeLaneWidth();
    level = 1;
    levelBannerTimer = 0;
    player = { lane: 1.5, targetLane: 1.5, y: 0, w: laneWidth * 0.52, h: laneWidth * 0.98 };
    traffic = [];
    roadOffset = 0;
    distance = 0;
    speed = 250;
    spawnTimer = 0;
    gameOverFlag = false;
    isPaused = false;
    isBraking = false;
    muteAudio(false);
  }

  function spawnCar(){
    const lane = Math.floor(Math.random()*LANES);
    const color = ['#e63946','#1d3557','#ffb703','#7209b7','#2a9d8f'][Math.floor(Math.random()*5)];
    traffic.push({ lane, y: -150, w: laneWidth * 0.52, h: laneWidth * 0.98, color });
  }

  function togglePause() {
    if (!running || gameOverFlag) return;
    isPaused = !isPaused;
    playClickSound();
    muteAudio(isPaused);

    if (isPaused) {
      document.getElementById('pauseSoundProfile').value = currentProfile;
      document.getElementById('pauseMenu').classList.remove('hidden');
    } else {
      document.getElementById('pauseMenu').classList.add('hidden');
    }
  }

  // --- CONTROLS BINDINGS ---
  window.addEventListener('keydown', (e) => { 
    const key = e.key.toLowerCase();
    
    if ((key === 'h' || e.key === ' ') && running && !isPaused && !gameOverFlag) {
      e.preventDefault();
      if (!keys[key]) {
        keys[key] = true;
        startHornSound();
        document.getElementById('hornBtn').classList.add('pressed');
      }
      return;
    }

    keys[key] = true; 
    
    if (key === 'p' || e.key === 'Escape') {
      togglePause();
    }
  });
  
  window.addEventListener('keyup', (e) => { 
    const key = e.key.toLowerCase();
    keys[key] = false;

    if (key === 'h' || e.key === ' ') {
      stopHornSound();
      document.getElementById('hornBtn').classList.remove('pressed');
    }
  });

  const hornBtn = document.getElementById('hornBtn');
  const startHornTouch = (e) => {
    e.preventDefault();
    if (running && !isPaused && !gameOverFlag) {
      startHornSound();
      hornBtn.classList.add('pressed');
    }
  };
  const stopHornTouch = (e) => {
    e.preventDefault();
    stopHornSound();
    hornBtn.classList.remove('pressed');
  };
  hornBtn.addEventListener('pointerdown', startHornTouch);
  hornBtn.addEventListener('pointerup', stopHornTouch);
  hornBtn.addEventListener('pointerleave', stopHornTouch);
  hornBtn.addEventListener('pointercancel', stopHornTouch);

  function bindTouch(elementId, stateKey) {
    const btn = document.getElementById(elementId);
    const start = (e) => {
      e.preventDefault();
      touchState[stateKey] = true;
      btn.classList.add('pressed');
    };
    const end = (e) => {
      e.preventDefault();
      touchState[stateKey] = false;
      btn.classList.remove('pressed');
    };

    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup', end);
    btn.addEventListener('pointercancel', end);
    btn.addEventListener('pointerleave', end);
  }

  bindTouch('touchLeft', 'left');
  bindTouch('touchRight', 'right');
  bindTouch('touchGas', 'gas');
  bindTouch('touchBrake', 'brake');

  document.getElementById('lightBtn').onclick = () => {
    headlightsOn = !headlightsOn;
    document.getElementById('lightBtn').classList.toggle('on', headlightsOn);
    playClickSound();
  };

  document.getElementById('pauseBtn').onclick = () => { togglePause(); };
  document.getElementById('btnResume').onclick = () => { togglePause(); };

  document.getElementById('soundProfile').onchange = (e) => {
    applyEngineProfile(e.target.value);
  };
  document.getElementById('pauseSoundProfile').onchange = (e) => {
    applyEngineProfile(e.target.value);
  };

  function update(dt){
    if (!running || isPaused || gameOverFlag) return;

    // Pedal Logic & Speed Mechanics
    const pressingGas = keys['w'] || keys['arrowup'] || touchState.gas;
    const pressingBrake = keys['s'] || keys['arrowdown'] || touchState.brake;

    isBraking = pressingBrake;

    const minSpeed = 100 + (level - 1) * 20;
    const maxSpeed = 780 + (level - 1) * 40;

    if (pressingGas) {
      speed = Math.min(maxSpeed, speed + 280 * dt);
    } else if (pressingBrake) {
      speed = Math.max(minSpeed, speed - 480 * dt);
    } else {
      // Natural Friction Coasting
      const targetSpeed = 260 + (level - 1) * 30;
      if (speed < targetSpeed) speed = Math.min(targetSpeed, speed + 100 * dt);
      else if (speed > targetSpeed) speed = Math.max(targetSpeed, speed - 120 * dt);
    }

    distance += speed * dt * 0.05;
    roadOffset += speed * dt;

    updateEngineAudio(speed);

    const newLevel = Math.floor(distance / distancePerLevel) + 1;
    if (newLevel > level) {
      level = newLevel;
      levelBannerTimer = 1.8;
      playLevelUpSound();
    }
    if (levelBannerTimer > 0) levelBannerTimer -= dt;

    const goLeft = keys['arrowleft'] || keys['a'] || touchState.left;
    const goRight = keys['arrowright'] || keys['d'] || touchState.right;

    playDriftSound(goLeft || goRight);

    if (goLeft && player.targetLane > 0) player.targetLane -= dt * 6;
    if (goRight && player.targetLane < LANES-1) player.targetLane += dt * 6;
    player.lane += (player.targetLane - player.lane) * Math.min(1, dt * 10);

    spawnTimer -= dt;
    if (spawnTimer <= 0){
      spawnCar();
      const spawnDelay = Math.max(0.35, 0.85 - (level - 1) * 0.06);
      spawnTimer = spawnDelay * (0.7 + Math.random()*0.6);
    }

    const playerY = H - 180;
    const px = laneX(player.lane);
    for (const car of traffic){
      car.y += (speed + 40) * dt;
      const cx = laneX(car.lane);
      if (Math.abs(cx - px) < (player.w+car.w)/2*0.82 && Math.abs(car.y - playerY) < (player.h+car.h)/2*0.8){
        gameOverFlag = true;
        running = false;
        playCrashSound();
        playDriftSound(false);
        document.getElementById('gameOverMenu').classList.remove('hidden');
        document.getElementById('hud').classList.add('hidden');
      }
    }
    traffic = traffic.filter(c => c.y < H + 200);

    document.getElementById('hudLevel').textContent = level;
    document.getElementById('hudScore').textContent = Math.floor(distance);
    document.getElementById('hudSpeed').textContent = Math.floor(speed * 0.55);
  }

  function drawRoadAndStreetlights(roadLeft, totalWidth) {
    const lightSpacing = 280;
    const currentOffset = roadOffset % lightSpacing;

    ctx.fillStyle = '#111419';
    ctx.fillRect(roadLeft, 0, totalWidth, H);

    for (let y = -lightSpacing + currentOffset; y < H + lightSpacing; y += lightSpacing) {
      const leftGlow = ctx.createRadialGradient(roadLeft - 10, y, 10, roadLeft + 40, y, 140);
      leftGlow.addColorStop(0, 'rgba(255, 200, 80, 0.35)');
      leftGlow.addColorStop(0.6, 'rgba(255, 180, 50, 0.1)');
      leftGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = leftGlow;
      ctx.fillRect(roadLeft - 50, y - 140, totalWidth / 2, 280);

      const rightGlow = ctx.createRadialGradient(roadLeft + totalWidth + 10, y, 10, roadLeft + totalWidth - 40, y, 140);
      rightGlow.addColorStop(0, 'rgba(255, 200, 80, 0.35)');
      rightGlow.addColorStop(0.6, 'rgba(255, 180, 50, 0.1)');
      rightGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rightGlow;
      ctx.fillRect(roadLeft + totalWidth / 2, y - 140, totalWidth / 2, 280);
    }

    ctx.strokeStyle = 'rgba(232,230,225,0.25)';
    ctx.setLineDash([30, 24]);
    for (let i = 1; i < LANES; i++){
      ctx.beginPath();
      ctx.lineDashOffset = -(roadOffset % 54);
      ctx.moveTo(roadLeft + laneWidth * i, 0);
      ctx.lineTo(roadLeft + laneWidth * i, H);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    const studSpacing = 60;
    const studOffset = roadOffset % studSpacing;
    for (let y = -studSpacing + studOffset; y < H + studSpacing; y += studSpacing) {
      ctx.fillStyle = '#ffb020';
      ctx.shadowColor = '#ffb020';
      ctx.shadowBlur = 8;
      ctx.fillRect(roadLeft - 3, y, 3, 10);
      ctx.fillRect(roadLeft + totalWidth, y, 3, 10);
    }
    ctx.shadowBlur = 0;

    for (let y = -lightSpacing + currentOffset; y < H + lightSpacing; y += lightSpacing) {
      ctx.fillStyle = '#444';
      ctx.fillRect(roadLeft - 22, y - 5, 12, 10);
      ctx.fillStyle = '#ffda79';
      ctx.shadowColor = '#ffda79';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(roadLeft - 16, y, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#444';
      ctx.fillRect(roadLeft + totalWidth + 10, y - 5, 12, 10);
      ctx.fillStyle = '#ffda79';
      ctx.shadowColor = '#ffda79';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(roadLeft + totalWidth + 16, y, 5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawDetailedCar(x, y, w, h, mainColor, isPlayer, hasHeadlights) {
    ctx.save();
    ctx.translate(x, y);

    const darkColor = shadeColor(mainColor, -40);
    const lightColor = shadeColor(mainColor, 20);

    if (hasHeadlights) {
      ctx.save();
      const lightBeam = ctx.createLinearGradient(0, -h/2, 0, -h/2 - 220);
      lightBeam.addColorStop(0, 'rgba(255, 250, 220, 0.45)');
      lightBeam.addColorStop(0.3, 'rgba(255, 240, 180, 0.15)');
      lightBeam.addColorStop(1, 'rgba(255, 240, 180, 0)');

      ctx.fillStyle = lightBeam;
      ctx.beginPath();
      ctx.moveTo(-w * 0.4, -h / 2);
      ctx.lineTo(-w * 1.4, -h / 2 - 220);
      ctx.lineTo(w * 1.4, -h / 2 - 220);
      ctx.lineTo(w * 0.4, -h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.beginPath();
    ctx.ellipse(0, 4, w * 0.58, h * 0.52, 0, 0, Math.PI * 2);
    ctx.fill();

    const tireW = w * 0.18, tireH = h * 0.22;
    [
      { x: -w/2 - tireW/4, y: -h/2 + tireH/2 },
      { x: w/2 - tireW*0.75, y: -h/2 + tireH/2 },
      { x: -w/2 - tireW/4, y: h/2 - tireH*1.2 },
      { x: w/2 - tireW*0.75, y: h/2 - tireH*1.2 }
    ].forEach(pos => {
      ctx.fillStyle = '#111';
      roundRect(ctx, pos.x, pos.y, tireW, tireH, 3);
      ctx.fill();
    });

    const bodyGradient = ctx.createLinearGradient(-w/2, 0, w/2, 0);
    bodyGradient.addColorStop(0, darkColor);
    bodyGradient.addColorStop(0.5, lightColor);
    bodyGradient.addColorStop(1, darkColor);

    ctx.fillStyle = bodyGradient;
    roundRect(ctx, -w/2, -h/2, w, h, w * 0.25);
    ctx.fill();

    const cabinW = w * 0.72, cabinH = h * 0.55, cabinY = -h/2 + h * 0.2;
    ctx.fillStyle = '#0a0d12';
    roundRect(ctx, -cabinW/2, cabinY, cabinW, cabinH, cabinW * 0.2);
    ctx.fill();

    ctx.fillStyle = mainColor;
    roundRect(ctx, -cabinW * 0.38, cabinY + cabinH * 0.28, cabinW * 0.76, cabinH * 0.45, 4);
    ctx.fill();

    // Brake / Tail Lights
    const brakeActive = isPlayer && isBraking;
    ctx.shadowColor = brakeActive ? '#ff0022' : '#ff4655';
    ctx.shadowBlur = brakeActive ? 22 : (isPlayer ? 10 : 4);
    ctx.fillStyle = brakeActive ? '#ff0022' : '#ff1a2a';
    roundRect(ctx, -w/2 + 4, h/2 - 6, w*0.25, 4, 2); ctx.fill();
    roundRect(ctx, w/2 - w*0.25 - 4, h/2 - 6, w*0.25, 4, 2); ctx.fill();

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    
    const roadCenter = W/2, totalWidth = laneWidth * LANES, roadLeft = roadCenter - totalWidth/2;

    drawRoadAndStreetlights(roadLeft, totalWidth);

    for (const car of traffic){
      drawDetailedCar(laneX(car.lane), car.y, car.w, car.h, car.color, false, false);
    }

    if (player) {
      drawDetailedCar(laneX(player.lane), H - 180, player.w, player.h, '#3de3d8', true, headlightsOn);
    }

    if (levelBannerTimer > 0) {
      ctx.save();
      ctx.font = '900 42px "Orbitron", sans-serif';
      ctx.fillStyle = '#ffb020';
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(255, 176, 32, 0.7)';
      ctx.shadowBlur = 15;
      ctx.fillText(`LEVEL ${level}`, W / 2, H * 0.35);
      ctx.restore();
    }
  }

  let lastTime = performance.now();
  function loop(now){
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('btnStart').onclick = () => {
    initAudio();
    resetGame();
    running = true;
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
  };

  document.getElementById('btnRetry').onclick = () => {
    initAudio();
    resetGame();
    running = true;
    document.getElementById('gameOverMenu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
  };

  requestAnimationFrame(loop);
})();
</script>
